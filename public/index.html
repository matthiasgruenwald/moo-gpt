<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Anwendung</title>
    <link rel="stylesheet" href="styles.css">
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.13.18/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.13.18/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.13.18/dist/contrib/auto-render.min.js"></script>
    <!-- Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Prism.js -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.23.0/themes/prism.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.23.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.23.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.23.0/components/prism-java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.23.0/components/prism-json.min.js"></script>
    <!-- Add more languages if needed -->

</head>

<body>
    <div class="chat-icon" id="chat-icon" onclick="toggleChat()">
        <img src="chat-icon.png" alt="Chat Icon">
    </div>
    <div class="chat-container" id="chat-container">
        <div class="chat-header">
            <div class="chat-header-icon-container">
                <img src="chat-icon.png" alt="Chat Icon" class="chat-header-icon">
            </div>
            <h1>MMBbS GPT</h1>
            <div class="header-icon">
                <img src="close-icon.png" alt="Close Icon" onclick="toggleChat()">
            </div>
        </div>
        <div class="chat-window" id="chat-window">
            <div class="message received">
                <p>Hallo, wie kann ich Ihnen helfen?</p>
            </div>
        </div>
        <div class="input-container">
            <input type="text" id="chat-input" placeholder="Geben Sie eine Nachricht ein..."
                onkeydown="handleKeyDown(event)">
            <button id="send-button" onclick="sendMessage()">Senden</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
