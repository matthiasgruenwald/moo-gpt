<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Anwendung</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="chat-icon" id="chat-icon" onclick="toggleChat()">
        <img src="chat-icon.png" alt="Chat Icon">
    </div>
    <div class="chat-container" id="chat-container">
        <div class="chat-header">
            <h1>MMBbS GPT</h1>
            <div class="header-icon">
                <img src="close-icon.png" alt="Close Icon" onclick="toggleChat()">
            </div>
        </div>
        <div class="chat-window" id="chat-window">
            <div class="message received">
                <p>Hallo, wie kann ich Ihnen helfen?</p>
            </div>
            <div class="message sent">
                <p>Ich habe eine Frage zu meinem Konto.</p>
            </div>
            <div class="message sent">
                <p>Ich habe eine Frage zu meinem Konto.</p>
            </div>
        </div>
        <div class="input-container">
            <input type="text" placeholder="Geben Sie eine Nachricht ein...">
            <button>Senden</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
