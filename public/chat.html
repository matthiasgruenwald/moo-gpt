<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lern-Assistent</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.13.18/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.13.18/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.13.18/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.23.0/themes/prism.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.23.0/prism.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #chat-header {
      background: #1a73e8;
      color: white;
      padding: 10px 16px;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    #chat-header img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
    }
    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .message {
      max-width: 85%;
      padding: 8px 12px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 14px;
    }
    .message.received {
      background: white;
      border: 1px solid #e0e0e0;
      align-self: flex-start;
    }
    .message.sent {
      background: #1a73e8;
      color: white;
      align-self: flex-end;
    }
    .message_loading {
      align-self: flex-start;
    }
    .message_loading img { height: 30px; }
    #input-container {
      display: flex;
      padding: 8px;
      background: white;
      border-top: 1px solid #e0e0e0;
      gap: 8px;
      flex-shrink: 0;
    }
    #chat-input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 20px;
      font-size: 14px;
      outline: none;
    }
    #chat-input:focus { border-color: #1a73e8; }
    #send-button {
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 14px;
    }
    #send-button:disabled { background: #aaa; cursor: not-allowed; }
    .connection-lost {
      color: #c00;
      text-align: center;
      padding: 8px;
      font-size: 13px;
    }
    pre code { font-size: 12px; }
  </style>
</head>
<body>

<div id="chat-header">
  <img id="header-icon" src="chat-icon.png" alt="Bot">
  <span id="header-title">Lern-Assistent</span>
</div>

<div id="chat-window">
  <div class="message received" id="opener-msg">
    <p>Hallo! Wie kann ich dir helfen?</p>
  </div>
</div>

<div id="input-container">
  <input type="text" id="chat-input" placeholder="Nachricht eingeben...">
  <button id="send-button">Senden</button>
</div>

<script>
  // URL-Parameter lesen
  const params = new URLSearchParams(window.location.search);
  const settings = {
    host:     params.get('host')     || window.location.hostname,
    protocol: params.get('protocol') || (window.location.protocol === 'https:' ? 'https' : 'http'),
    port:     parseInt(params.get('port')) || (window.location.protocol === 'https:' ? 443 : 3000),
    task:     params.get('task')     || '',
    hints:    params.get('hints')    || '',
    opener:   params.get('opener')   || 'Hallo! Wie kann ich dir helfen?',
    title:    params.get('title')    || 'Lern-Assistent',
    chat_icon: params.get('icon')    || null,
  };

  // Opener und Titel setzen
  document.getElementById('opener-msg').innerHTML = `<p>${settings.opener}</p>`;
  document.getElementById('header-title').textContent = settings.title;
  if (settings.chat_icon) {
    document.getElementById('header-icon').src = settings.chat_icon;
  }

  // WebSocket aufbauen
  const wsProtocol = settings.protocol === 'https' ? 'wss' : 'ws';
  const wsUrl = `${wsProtocol}://${settings.host}:${settings.port}/api/chat`;
  const ws = new WebSocket(wsUrl);
  let msgCount = 0;

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'settings', data: settings }));
  };

  ws.onerror = ws.onclose = () => {
    document.getElementById('input-container').innerHTML =
      '<div class="connection-lost">Verbindung unterbrochen – bitte Seite neu laden.</div>';
  };

  ws.onmessage = (event) => {
    const chatWindow = document.getElementById('chat-window');
    const chatInput  = document.getElementById('chat-input');
    const sendBtn    = document.getElementById('send-button');
    try {
      const obj = JSON.parse(event.data);
      let text = obj.messages
        .replace(/\\\[/g, '$$').replace(/\\\]/g, '$$')
        .replace(/\\\(/g, '$').replace(/\\\)/g, '$');
      const html = marked.parse(text);

      const loading = document.getElementById('loading');
      if (msgCount === 0) {
        if (loading) chatWindow.removeChild(loading);
        const msg = document.createElement('div');
        msg.className = 'message received';
        msg.innerHTML = html;
        chatWindow.appendChild(msg);
        if (window.renderMathInElement) {
          renderMathInElement(msg, {
            delimiters: [{ left:'$$', right:'$$', display:true }, { left:'$', right:'$', display:false }]
          });
        }
      } else {
        const last = chatWindow.querySelector('.message.received:last-child');
        if (last) {
          last.innerHTML = html;
          if (window.renderMathInElement) renderMathInElement(last);
        }
      }
      msgCount++;
      if (window.Prism) Prism.highlightAll();
      if (obj.end) {
        chatInput.disabled = false;
        sendBtn.disabled = false;
        chatInput.focus();
      }
      chatWindow.scrollTop = chatWindow.scrollHeight;
    } catch(e) { console.error(e); }
  };

  function sendMessage() {
    const chatInput = document.getElementById('chat-input');
    const chatWindow = document.getElementById('chat-window');
    const sendBtn = document.getElementById('send-button');
    const text = chatInput.value.trim();
    if (!text) return;

    const msg = document.createElement('div');
    msg.className = 'message sent';
    msg.innerHTML = `<p>${text}</p>`;
    chatWindow.appendChild(msg);

    const loading = document.createElement('div');
    loading.className = 'message_loading';
    loading.id = 'loading';
    loading.innerHTML = `<img src="${settings.protocol}://${settings.host}:${settings.port}/loading.gif" alt="...">`;
    chatWindow.appendChild(loading);
    chatWindow.scrollTop = chatWindow.scrollHeight;

    chatInput.value = '';
    chatInput.disabled = true;
    sendBtn.disabled = true;
    msgCount = 0;

    ws.send(JSON.stringify({ type: 'chatmsg', data: { message: text } }));
  }

  document.getElementById('send-button').onclick = sendMessage;
  document.getElementById('chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });
</script>
</body>
</html>
