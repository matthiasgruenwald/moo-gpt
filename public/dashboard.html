<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schüler-Dashboard – MMBbS GPT</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    #header {
      background: #003366;
      color: white;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    #header h1 { font-size: 18px; font-weight: 600; flex: 1; }
    #header .badge-live {
      font-size: 12px;
      background: #28a745;
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      display: none;
    }
    #header .badge-live.visible { display: inline-block; }
    #status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #aaa;
      flex-shrink: 0;
    }
    #status-dot.connected { background: #28a745; }

    /* ── Toolbar ─────────────────────────────────────────────────────────── */
    #toolbar {
      background: #004085;
      color: white;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      font-size: 14px;
    }
    #toolbar label { font-size: 13px; }
    #sort-select {
      background: #003366;
      color: white;
      border: 1px solid #5588bb;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 13px;
      cursor: pointer;
    }
    #student-count { margin-left: auto; font-size: 13px; opacity: 0.85; }

    /* ── Layout ──────────────────────────────────────────────────────────── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Schülerliste ────────────────────────────────────────────────────── */
    #list-panel {
      width: 300px;
      min-width: 220px;
      background: white;
      border-right: 1px solid #dde3ea;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    #student-list {
      flex: 1;
      overflow-y: auto;
    }
    .student-item {
      padding: 12px 16px;
      border-bottom: 1px solid #eef0f3;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: background 0.15s;
      position: relative;
    }
    .student-item:hover { background: #f0f4f8; }
    .student-item.active { background: #e8f0fe; border-left: 3px solid #004085; }
    .student-name {
      font-weight: 600;
      font-size: 14px;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .student-meta {
      font-size: 12px;
      color: #666;
      display: flex;
      gap: 10px;
    }
    .badge-new {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #28a745;
      animation: pulse 1.5s infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .msg-count {
      background: #004085;
      color: white;
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 10px;
    }
    .empty-list {
      padding: 24px 16px;
      color: #888;
      font-size: 14px;
      text-align: center;
    }

    /* ── Chat-Panel ──────────────────────────────────────────────────────── */
    #chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #f7f9fc;
    }
    #chat-header {
      background: #004085;
      color: white;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #back-btn {
      display: none;
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }
    #chat-title { flex: 1; }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chat-placeholder {
      margin: auto;
      color: #aaa;
      font-size: 15px;
      text-align: center;
    }
    .msg-bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg-bubble.user {
      align-self: flex-end;
      background: #004085;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg-bubble.assistant {
      align-self: flex-start;
      background: white;
      color: #1a1a1a;
      border: 1px solid #dde3ea;
      border-bottom-left-radius: 4px;
    }
    .msg-bubble.assistant pre {
      white-space: pre-wrap;
      font-size: 13px;
    }
    .msg-time {
      font-size: 11px;
      opacity: 0.6;
      margin-top: 3px;
      text-align: right;
    }
    .msg-bubble.assistant .msg-time { text-align: left; }

    /* ── Opener & Session-Header ─────────────────────────────────────────── */
    .opener-message {
      align-self: flex-start;
      background: white;
      color: #1a1a1a;
      border: 1px solid #dde3ea;
      border-bottom-left-radius: 4px;
      border-radius: 14px;
      max-width: 72%;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.5;
      opacity: 0.75;
      font-style: italic;
    }
    .session-header {
      text-align: center;
      font-size: 11px;
      color: #888;
      margin: 14px 0 6px;
      padding: 4px 0;
      border-top: 1px solid #e0e4ea;
      letter-spacing: 0.02em;
    }

    /* ── Mobile (<768px) ─────────────────────────────────────────────────── */
    @media (max-width: 767px) {
      #list-panel { width: 100%; border-right: none; }
      #chat-panel { display: none; }
      #list-panel.hidden { display: none; }
      #chat-panel.mobile-visible {
        display: flex;
        position: absolute;
        inset: 0;
        top: 0;
        z-index: 100;
      }
      #back-btn { display: block; }
    }

    /* ── Ladeindikator ───────────────────────────────────────────────────── */
    .loading {
      color: #888;
      font-size: 13px;
      padding: 12px 16px;
      text-align: center;
    }
  </style>
</head>
<body>

<div id="header">
  <div id="status-dot" title="WebSocket-Status"></div>
  <h1 id="page-title">Schüler-Dashboard</h1>
  <span id="live-badge" class="badge-live">LIVE</span>
</div>

<div id="toolbar">
  <label for="sort-select">Sortierung:</label>
  <select id="sort-select">
    <option value="activity">Letzte Aktivität</option>
    <option value="name">Name</option>
  </select>
  <span id="student-count"></span>
</div>

<div id="main">
  <!-- Schülerliste -->
  <div id="list-panel">
    <div id="student-list">
      <div class="loading">Verbinde…</div>
    </div>
  </div>

  <!-- Chat-Ansicht -->
  <div id="chat-panel">
    <div id="chat-header">
      <button id="back-btn" title="Zurück zur Liste">&#8592;</button>
      <span id="chat-title">Schüler auswählen</span>
    </div>
    <div id="chat-messages">
      <div class="chat-placeholder">← Schüler in der Liste auswählen</div>
    </div>
  </div>
</div>

<script type="module" src="dashboard.js"></script>
</body>
</html>
