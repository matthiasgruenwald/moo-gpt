<script type="module" async="" id="mmbbs-bot">
    // Funktion zum Laden einer externen JavaScript-Datei
    import {
        MMBBSBOT
    } from 'https://service.joerg-tuttas.de:3001/mmbbs-bot.js';

    function loadScript(url, callback) {
        var script = document.createElement('script');
        script.type = 'text/javascript';

        // Wenn das Skript geladen ist, rufe die Callback-Funktion auf
        script.onload = function () {
            console.log(url + ' geladen.');
            if (callback) {
                callback();
            }
        };

        // Setze die Skriptquelle auf die übergebene URL
        script.src = url;

        // Füge das Skript dem Dokument hinzu
        document.head.appendChild(script);
    }

    // Beispiel zum Laden von jQuery und dann Ausführen eines Codes
    loadScript('https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.4.0/highlight.min.js', function () {
        // Code, der ausgeführt wird, nachdem jQuery geladen ist
        console.log("Bibo geladen!")
        hljs.highlightAll();
        // Wählt das erste Element mit der Klasse "activity-description" aus
        var element = document.querySelector('.activity-description');
        var htmlContent = element.innerHTML;
        const settings = {
            "host": "service.joerg-tuttas.de",
            "protocol": "https",
            "port": 3001,
            "opener": "Hallo wie kann ich Dir bei der Aufgabe helfen?",
            "chat_icon": "https://service.joerg-tuttas.de/tu.png",
            "title": "Tuttas GPT",
            "task": htmlContent,
            "hints": "Du bist Experte in Java Programmierung und Mathematik, Du erstellst aber keinen Java Code als Beispiel sondern gibst lediglich Lösungshinweise."
        };

        const bot = new MMBBSBOT(settings);
    });
</script>
