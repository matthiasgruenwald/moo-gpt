<script type="module" async="" id="mmbbs-bot">
    // Funktion zum Laden einer externen JavaScript-Datei als Promise
    function loadScript(url) {
        return new Promise((resolve, reject) => {
            var script = document.createElement('script');
            script.type = 'text/javascript';

            script.onload = function () {
                console.log(url + ' geladen.');
                resolve();
            };

            script.onerror = function () {
                reject(new Error(url + ' konnte nicht geladen werden.'));
            };

            script.src = url;
            document.head.appendChild(script);
        });
    }

    // Liste der zu ladenden Skripte
    const scripts = [
        'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.4.0/highlight.min.js',
        // Weitere Skripte hier hinzufügen
        "https://cdn.jsdelivr.net/npm/katex@0.13.18/dist/katex.min.js",
        "https://cdn.jsdelivr.net/npm/katex@0.13.18/dist/contrib/auto-render.min.js",
        "https://cdnjs.cloudflare.com/ajax/libs/prism/1.23.0/prism.min.js",
        "https://cdnjs.cloudflare.com/ajax/libs/prism/1.23.0/components/prism-python.min.js",
        "https://cdnjs.cloudflare.com/ajax/libs/prism/1.23.0/components/prism-java.min.js",
        "https://cdnjs.cloudflare.com/ajax/libs/prism/1.23.0/components/prism-json.min.js"
    ];

    // Import des MMBBSBOT Moduls
    import { MMBBSBOT } from 'https://service.joerg-tuttas.de:3001/mmbbs-bot.js';

    // Funktion, die aufgerufen wird, wenn alle Skripte geladen sind
    function initializeBot() {
        console.log("Alle Bibliotheken geladen!");

        hljs.highlightAll();
        var element = document.querySelector('.activity-description');
        var htmlContent = element.innerHTML;

        const settings = {
            "host": "service.joerg-tuttas.de",
            "protocol": "https",
            "port": 3001,
            "opener": "Hallo wie kann ich Dir bei der Aufgabe helfen?",
            "chat_icon": "https://service.joerg-tuttas.de/tu.png",
            "title": "Tuttas GPT",
            "task": htmlContent,
            "hints": "Du bist Experte in Java Programmierung und Mathematik, Du erstellst aber keinen Java Code als Beispiel sondern gibst lediglich Lösungshinweise."
        };

        const bot = new MMBBSBOT(settings);
    }

    // Alle Skripte laden und dann den Bot initialisieren
    Promise.all(scripts.map(loadScript))
        .then(initializeBot)
        .catch(error => console.error(error));
</script>
