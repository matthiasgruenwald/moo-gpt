<!-- Snippet 1: Lern-Assistent für Moodle-Aufgaben -->
<!-- Liest Aufgabentext und Bilder automatisch von der Seite -->
<script type="module" async id="mmbbs-bot">
  var element = document.querySelector('.activity-description');
  var htmlContent = element ? element.innerHTML : '';
  const settings = {
    "host":     "gpt.gruenwald.fun",
    "protocol": "https",
    "port":     443,
    "opener":   "Hallo! Wie kann ich dir bei der Aufgabe helfen?",
    "title":    "Lern-Assistent",
    "task":     htmlContent,
    "hints":    "{{Hinweise für den Bot (z.B.: Du bist Biologielehrer an einer IGS Jg. 9. Gib Lösungshinweise aber keine fertigen Antworten.)}}"
  };
  import { MMBBSBOT } from 'https://gpt.gruenwald.fun/mmbbs-bot.js';
  const bot = new MMBBSBOT(settings);
</script>
